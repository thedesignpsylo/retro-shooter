<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Retro Shooter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --shell-1:#f6b53a;
    --shell-2:#e89b1e;
    --shell-3:#c97b0d;
    --shell-shadow:#7a4806;
    --shell-hilite:#ffd97a;
    --bezel:#3a3a3a;
    --bezel-2:#1f1f1f;
    --btn:#4a4a4a;
    --btn-dark:#2c2c2c;
    --btn-hi:#6a6a6a;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:'Press Start 2P',monospace;
    color:#fff;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
    user-select:none;
  }
  body{
    display:flex;align-items:center;justify-content:center;
    background: radial-gradient(ellipse at 30% 10%, #2a2722 0%, #141312 60%, #0a0a0a 100%);
    min-height:100dvh;
    padding:
      env(safe-area-inset-top)
      env(safe-area-inset-right)
      env(safe-area-inset-bottom)
      env(safe-area-inset-left);
  }

  /* ── Device shell ── */
  .device{
    --w: min(420px, 100vw);
    width: var(--w);
    height: min(calc(var(--w) * 2.05), 100dvh);
    max-height: 920px;
    position: relative;
    border-radius: 36px;
    background:
      linear-gradient(120deg, var(--shell-hilite) 0%, var(--shell-1) 22%, var(--shell-2) 55%, var(--shell-3) 100%);
    box-shadow:
      inset 0 4px 0 rgba(255,255,255,.55),
      inset 0 -10px 0 rgba(0,0,0,.18),
      inset 0 0 0 2px rgba(0,0,0,.25),
      0 30px 60px -20px rgba(0,0,0,.6),
      0 8px 0 var(--shell-shadow);
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* surface sheen */
  .device::before{
    content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background: linear-gradient(115deg,
      rgba(255,255,255,.18) 0%,
      rgba(255,255,255,0)   35%,
      rgba(255,255,255,0)   60%,
      rgba(255,255,255,.12) 100%);
  }

  /* ── Speaker vents ── */
  .vents{
    display:flex;justify-content:space-around;gap:14px;padding:0 30px;
  }
  .vents.top  { padding-bottom:10px; }
  .vents.bot  { padding-top:6px; padding-bottom:12px; }
  .vents span{
    flex:1;height:6px;border-radius:6px;
    background: linear-gradient(180deg, #5a3a06, #2a1a02);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 1px 0 rgba(255,255,255,.35);
  }

  /* ── Screen ── */
  .screen-wrap{
    flex:1 1 auto;
    margin: 8px 6px 12px;
    border-radius: 18px;
    padding: 14px;
    background: linear-gradient(180deg, #2a1a02, #1a0e00 60%, #2a1a02);
    box-shadow:
      inset 0 6px 12px rgba(0,0,0,.55),
      inset 0 -2px 0 rgba(255,255,255,.08),
      0 0 0 2px rgba(0,0,0,.2);
    position: relative;
  }
  .screen{
    position:relative;
    width:100%;height:100%;
    background:#000;
    border-radius:6px;
    overflow:hidden;
    box-shadow: inset 0 0 0 1px #000, inset 0 0 0 3px #0a0a0a;
  }
  /* glass shine overlay */
  .screen::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background: linear-gradient(135deg,
      rgba(255,255,255,.10) 0%,
      rgba(255,255,255,.02) 22%,
      rgba(255,255,255,0)   45%);
    mix-blend-mode:screen;
  }
  canvas{
    position:absolute;inset:0;width:100%;height:100%;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    display:block;
  }

  /* ── Controls ── */
  .controls{
    display:flex;align-items:center;justify-content:space-between;
    padding: 4px 18px 14px;
    gap: 16px;
  }

  /* D-pad */
  .dpad{
    --s:110px;
    width:var(--s);height:var(--s);
    position:relative;flex-shrink:0;
  }
  .dpad .arm{
    position:absolute;
    background:linear-gradient(180deg, var(--btn-hi), var(--btn) 40%, var(--btn-dark));
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,.18),
      inset 0 -3px 0 rgba(0,0,0,.45),
      0 2px 0 rgba(0,0,0,.4);
    border-radius:8px;
  }
  .dpad .arm.h{ left:0;right:0;top:33%;bottom:33%; }
  .dpad .arm.v{ top:0;bottom:0;left:33%;right:33%; }
  .dpad .hub{
    position:absolute;left:33%;right:33%;top:33%;bottom:33%;
    background:#2a2a2a;
    box-shadow:inset 0 0 0 2px #1a1a1a;
  }
  .dpad button{
    position:absolute;background:transparent;border:0;padding:0;margin:0;cursor:pointer;
    color:#bdbdbd;font-family:inherit;font-size:10px;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  .dpad .btn-left { left:0;top:33%;bottom:33%;width:33%; }
  .dpad .btn-right{ right:0;top:33%;bottom:33%;width:33%; }
  .dpad .btn-up   { top:0;left:33%;right:33%;height:33%;opacity:.45; }
  .dpad .btn-down { bottom:0;left:33%;right:33%;height:33%;opacity:.45; }
  .dpad button.pressed::after{
    content:"";position:absolute;inset:6px;border-radius:6px;background:rgba(0,0,0,.35);
  }
  .dpad svg{width:14px;height:14px;filter:drop-shadow(0 1px 0 rgba(0,0,0,.5));}

  /* Fire button */
  .fire-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .fire{
    width:96px;height:96px;border-radius:50%;
    background:radial-gradient(circle at 30% 25%, #ff8585 0%, #d6261e 45%, #8a0d09 100%);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,.35),
      inset 0 -6px 0 rgba(0,0,0,.45),
      0 6px 0 #5a0606,
      0 8px 14px rgba(0,0,0,.45);
    color:#fff;border:0;cursor:pointer;
    font-family:'Press Start 2P',monospace;font-size:13px;letter-spacing:1px;
    text-shadow:0 2px 0 rgba(0,0,0,.5);
    transition:transform .05s ease, box-shadow .05s ease;
    flex-shrink:0;
  }
  .fire:active, .fire.pressed{
    transform:translateY(4px);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,.25),
      inset 0 -3px 0 rgba(0,0,0,.45),
      0 2px 0 #5a0606,
      0 4px 8px rgba(0,0,0,.45);
  }
  .fire-label{font-size:8px;color:#5a3804;letter-spacing:2px;text-shadow:0 1px 0 rgba(255,255,255,.4);}

  .brand{
    position:absolute;left:0;right:0;bottom:6px;text-align:center;
    font-family:'VT323',monospace;color:#5a3804;font-size:14px;letter-spacing:3px;opacity:.7;
  }

  /* responsive: short screens */
  @media (max-height:760px){
    .device{padding:12px 10px;}
    .dpad{--s:96px;}
    .fire{width:84px;height:84px;font-size:12px;}
  }
  @media (max-height:640px){
    .dpad{--s:84px;}
    .fire{width:72px;height:72px;font-size:11px;}
    .vents.top,.vents.bot{padding-top:4px;padding-bottom:6px;}
  }
</style>
</head>
<body>

<div class="device" id="device">
  <div class="vents top"><span></span><span></span><span></span><span></span><span></span></div>

  <div class="screen-wrap">
    <div class="screen" id="screen">
      <canvas id="game" width="160" height="256"></canvas>
    </div>
  </div>

  <div class="vents bot"><span></span><span></span><span></span><span></span><span></span></div>

  <div class="controls">
    <div class="dpad" aria-label="Direction pad">
      <div class="arm h"></div>
      <div class="arm v"></div>
      <div class="hub"></div>
      <button class="btn-up"    aria-label="up"    disabled>
        <svg viewBox="0 0 10 10"><polygon points="5,2 8,7 2,7" fill="#888"/></svg>
      </button>
      <button class="btn-down"  aria-label="down"  disabled>
        <svg viewBox="0 0 10 10"><polygon points="5,8 8,3 2,3" fill="#888"/></svg>
      </button>
      <button class="btn-left"  id="btnLeft"  aria-label="left">
        <svg viewBox="0 0 10 10"><polygon points="2,5 7,2 7,8" fill="#ddd"/></svg>
      </button>
      <button class="btn-right" id="btnRight" aria-label="right">
        <svg viewBox="0 0 10 10"><polygon points="8,5 3,2 3,8" fill="#ddd"/></svg>
      </button>
    </div>

    <div class="fire-wrap">
      <button class="fire" id="btnFire" aria-label="fire">FIRE</button>
      <div class="fire-label">SHOOT</div>
    </div>
  </div>

  <div class="brand">GAMEBOY  PIXEL</div>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx    = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const W = canvas.width;   // 160
  const H = canvas.height;  // 256

  // ── Colour palette ──────────────────────────────────────────────────────────
  const PAL = {
    '.': null,
    'R': '#ef2b2b',
    'D': '#8a1414',
    'W': '#ffffff',
    'B': '#2a8cff',
    'C': '#62b6ff',
    'Y': '#ffe24a',
    'K': '#222222',
    'G': '#9a9a9a',
    'P': '#b54bff',
    'M': '#5a0a8a'
  };

  // ── Pixel sprites ────────────────────────────────────────────────────────────
  // Player ship (15 × 14) — red top, white wings, blue body
  const PLAYER_SPR = [
    ".......R.......",
    "......RDR......",
    "......RDR......",
    ".....RRDRR.....",
    "..W..R.D.R..W..",
    ".WW.RRRDRRR.WW.",
    "WWWRRBBCBBRRWWW",
    "WWWRRBCWCBRRWWW",
    "WWWRRBBCBBRRWWW",
    ".W.RRRBCBRRR.W.",
    "...R.RBCBR.R...",
    ".....RBCBR.....",
    "......BCB......",
    ".......C......."
  ];

  // Enemy plane (13 × 10) — red/white, pointing downward
  const ENEMY_SPR = [
    "...R.....R...",
    "...RR...RR...",
    "..WRRR.RRRW..",
    ".WWRRRRRRRWW.",
    "WWWRRRWRRRWWW",
    "WW.RRRWRRR.WW",
    "...RR.W.RR...",
    "....R.W.R....",
    "....R.R.R....",
    ".....R.R....."
  ];

  // Mega boss (19 × 12)
  const MEGA_SPR = [
    ".....R.......R.....",
    "....RDR.....RDR....",
    "...RRDRR...RRDRR...",
    "..WRRRRR.R.RRRRRW..",
    ".WWRRRRRRDRRRRRRWW.",
    "WWWRRWWRRDRRWWRRWWW",
    "WW.RRWWRRDRRWWRR.WW",
    "...RRRRRRDRRRRRR...",
    "...RRRRRR.RRRRRR...",
    "....RRRR...RRRR....",
    ".....RR.....RR.....",
    "......R.....R......"
  ];

  // Life icon (7 × 7)
  const LIFE_SPR = [
    "...R...",
    "..RDR..",
    ".RRDRR.",
    "WRBCBRW",
    "WRBCBRW",
    "..RCR..",
    "...C..."
  ];

  function sprW(sp){ return sp[0].length; }
  function sprH(sp){ return sp.length; }

  function drawSprite(sp, x, y, scale=1, tint=null){
    for(let row=0; row<sp.length; row++){
      const line = sp[row];
      for(let col=0; col<line.length; col++){
        const c = PAL[line[col]];
        if(!c) continue;
        ctx.fillStyle = tint || c;
        ctx.fillRect(Math.floor(x + col*scale), Math.floor(y + row*scale), scale, scale);
      }
    }
  }

  // ── Pixel font (5×7 bitmaps) ─────────────────────────────────────────────────
  const FONT = {
    '0':["111","101","101","101","111"],
    '1':["010","110","010","010","111"],
    '2':["111","001","111","100","111"],
    '3':["111","001","111","001","111"],
    '4':["101","101","111","001","001"],
    '5':["111","100","111","001","111"],
    '6':["111","100","111","101","111"],
    '7':["111","001","010","010","010"],
    '8':["111","101","111","101","111"],
    '9':["111","101","111","001","111"],
    'A':["010","101","111","101","101"],
    'B':["110","101","110","101","110"],
    'C':["011","100","100","100","011"],
    'D':["110","101","101","101","110"],
    'E':["111","100","110","100","111"],
    'F':["111","100","110","100","100"],
    'G':["011","100","101","101","011"],
    'H':["101","101","111","101","101"],
    'I':["111","010","010","010","111"],
    'J':["001","001","001","101","010"],
    'K':["101","101","110","101","101"],
    'L':["100","100","100","100","111"],
    'M':["101","111","111","101","101"],
    'N':["101","111","111","111","101"],
    'O':["010","101","101","101","010"],
    'P':["110","101","110","100","100"],
    'Q':["010","101","101","111","011"],
    'R':["110","101","110","101","101"],
    'S':["011","100","010","001","110"],
    'T':["111","010","010","010","010"],
    'U':["101","101","101","101","111"],
    'V':["101","101","101","101","010"],
    'W':["101","101","111","111","101"],
    'X':["101","101","010","101","101"],
    'Y':["101","101","010","010","010"],
    'Z':["111","001","010","100","111"],
    ' ':["000","000","000","000","000"],
    '-':["000","000","111","000","000"],
    ':':["000","010","000","010","000"],
    '.':["000","000","000","000","010"],
    '!':["010","010","010","000","010"]
  };

  function drawText(str, x, y, color='#ffffff', scale=1, spacing=1){
    let cx = x;
    for(const ch of str.toUpperCase()){
      const g = FONT[ch] || FONT[' '];
      for(let r=0; r<g.length; r++)
        for(let c=0; c<g[r].length; c++)
          if(g[r][c]==='1'){
            ctx.fillStyle = color;
            ctx.fillRect(cx + c*scale, y + r*scale, scale, scale);
          }
      cx += (g[0].length + spacing) * scale;
    }
    return cx;
  }

  function textW(str, scale=1, spacing=1){
    let w = 0;
    for(const ch of str.toUpperCase()){
      const g = FONT[ch] || FONT[' '];
      w += (g[0].length + spacing)*scale;
    }
    return w - spacing*scale;
  }

  // ── Starfield ────────────────────────────────────────────────────────────────
  const stars = [];
  function initStars(){
    stars.length = 0;
    for(let i=0; i<60; i++){
      stars.push({
        x:    Math.random() * W,
        y:    Math.random() * H,
        size: Math.random() < 0.15 ? 2 : 1,
        vel:  0.15 + Math.random() * 0.5,
        kind: Math.random() < 0.1 ? 'cross' : 'dot'
      });
    }
  }
  function updateDrawStars(){
    for(const s of stars){
      s.y += s.vel;
      if(s.y > H){ s.y = -2; s.x = Math.random() * W; }
      ctx.fillStyle = '#cfcfcf';
      if(s.kind === 'cross'){
        ctx.fillRect(s.x,   s.y,   1, 1);
        ctx.fillRect(s.x-1, s.y,   1, 1);
        ctx.fillRect(s.x+1, s.y,   1, 1);
        ctx.fillRect(s.x,   s.y-1, 1, 1);
        ctx.fillRect(s.x,   s.y+1, 1, 1);
      } else {
        ctx.fillRect(s.x|0, s.y|0, s.size, s.size);
      }
    }
  }

  // ── Game state ───────────────────────────────────────────────────────────────
  const STATE = { START:0, PLAY:1, OVER:2 };
  let state = STATE.START;

  const player = {
    x: W/2 - sprW(PLAYER_SPR)/2,
    y: H - sprH(PLAYER_SPR) - 14,
    w: sprW(PLAYER_SPR),
    h: sprH(PLAYER_SPR),
    speed:    1.6,
    cooldown: 0,
    invul:    0,
    flash:    0
  };

  let bullets       = [];
  let enemies       = [];
  let megas         = [];
  let booms         = [];
  let score         = 0;
  let lives         = 3;
  let spawnTimer    = 0;
  let megaTimer     = 0;
  let difficulty    = 1;
  let level         = 1;
  let blink         = 0;
  let purseFlash    = 0;   // frames of current purple pulse
  let purplePulses  = 0;   // pulses still queued
  let purpleGap     = 0;   // gap frames between pulses
  let levelBanner   = 0;
  let nextPurpleAt  = 500;
  let nextLevelAt   = 1000;

  const input = { left:false, right:false, fire:false };

  function resetGame(){
    bullets=[]; enemies=[]; megas=[]; booms=[];
    score=0; lives=3;
    player.x=W/2-player.w/2;
    player.cooldown=0; player.invul=0; player.flash=0;
    spawnTimer=0; megaTimer=0;
    difficulty=1; level=1; blink=0;
    purseFlash=0; purplePulses=0; purpleGap=0;
    levelBanner=0;
    nextPurpleAt=500; nextLevelAt=1000;
  }

  function triggerPurpleFlash(){
    purseFlash      = 10;
    purplePulses    = 1;
    purpleGap       = 0;
  }

  function triggerLevelUp(){
    level++;
    difficulty += 0.6;
    levelBanner = 120;
  }

  function addScore(n){
    score += n;
    if(Math.floor(score/100) > Math.floor((score-n)/100)) difficulty += 0.1;
    while(score >= nextPurpleAt){ triggerPurpleFlash(); nextPurpleAt += 500; }
    while(score >= nextLevelAt) { triggerLevelUp();    nextLevelAt  += 1000; }
  }

  // ── Spawners ─────────────────────────────────────────────────────────────────
  function spawnEnemy(){
    const w = sprW(ENEMY_SPR);
    enemies.push({
      x: 6 + Math.random() * (W - w - 12),
      y: -sprH(ENEMY_SPR),
      w, h: sprH(ENEMY_SPR),
      speed:    0.35 + Math.random()*0.5 + difficulty*0.1,
      swayAmp:  6 + Math.random()*10,
      swayFreq: 0.02 + Math.random()*0.03,
      t: Math.random()*100
    });
  }

  function spawnMega(){
    const w = sprW(MEGA_SPR);
    megas.push({
      x: 8 + Math.random() * (W - w - 16),
      y: -sprH(MEGA_SPR),
      w, h: sprH(MEGA_SPR),
      speed:    0.12 + Math.min(0.18, level*0.02),
      swayAmp:  10, swayFreq: 0.012,
      t: Math.random()*100,
      hp: 6, maxHp: 6,
      hitFlash: 0
    });
  }

  // ── Fire ─────────────────────────────────────────────────────────────────────
  function fireBullets(){
    if(player.cooldown > 0) return;
    const cx = player.x + player.w/2 - 1;
    bullets.push({x: cx-2, y: player.y-2, w:1, h:5});
    bullets.push({x: cx+1, y: player.y-2, w:1, h:5});
    player.cooldown = 10;
  }

  function rectsOverlap(a, b){
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  function loseLife(){
    lives--;
    player.invul = 90;
    player.flash = 90;
    if(lives <= 0) state = STATE.OVER;
  }

  // ── Update ───────────────────────────────────────────────────────────────────
  function update(){
    blink = (blink + 1) % 60;

    if(state !== STATE.PLAY) return;

    // player movement
    if(input.left)  player.x -= player.speed;
    if(input.right) player.x += player.speed;
    player.x = Math.max(2, Math.min(W - player.w - 2, player.x));
    if(input.fire) fireBullets();
    if(player.cooldown > 0) player.cooldown--;
    if(player.invul    > 0) player.invul--;
    if(player.flash    > 0) player.flash--;

    // bullets travel upward
    for(let i=bullets.length-1; i>=0; i--){
      bullets[i].y -= 3.5;
      if(bullets[i].y < -6) bullets.splice(i, 1);
    }

    // spawn small enemies
    spawnTimer++;
    const interval = Math.max(24, 75 - difficulty*8);
    if(spawnTimer >= interval){
      spawnTimer = 0;
      spawnEnemy();
      if(Math.random() < Math.min(0.45, difficulty*0.1)) spawnEnemy();
    }

    // spawn mega ships once score >= 500
    if(score >= 500){
      megaTimer++;
      const megaInterval = Math.max(360, 780 - level*60);
      const maxMegas     = level >= 4 ? 2 : 1;
      if(megaTimer >= megaInterval && megas.length < maxMegas){
        megaTimer = 0;
        spawnMega();
      }
    }

    // update small enemies
    for(let i=enemies.length-1; i>=0; i--){
      const e = enemies[i];
      e.t++;
      e.y += e.speed;
      e.x += Math.sin(e.t * e.swayFreq) * (e.swayAmp * 0.02);

      if(e.y > H){
        enemies.splice(i, 1);
        if(player.invul <= 0) loseLife();
        continue;
      }

      // bullet hits
      let killed = false;
      for(let j=bullets.length-1; j>=0; j--){
        if(rectsOverlap(bullets[j], e)){
          bullets.splice(j, 1);
          enemies.splice(i, 1);
          booms.push({x:e.x+e.w/2, y:e.y+e.h/2, t:0, big:false});
          addScore(10);
          killed = true;
          break;
        }
      }
      if(killed) continue;

      // player collision
      if(player.invul <= 0 &&
         rectsOverlap(e, {x:player.x+2, y:player.y+2, w:player.w-4, h:player.h-4})){
        enemies.splice(i, 1);
        booms.push({x:e.x+e.w/2, y:e.y+e.h/2, t:0, big:false});
        loseLife();
      }
    }

    // update mega ships
    for(let i=megas.length-1; i>=0; i--){
      const m = megas[i];
      m.t++;
      m.y += m.speed;
      m.x += Math.sin(m.t * m.swayFreq) * (m.swayAmp * 0.02);
      if(m.hitFlash > 0) m.hitFlash--;

      if(m.y > H){
        megas.splice(i, 1);
        if(player.invul <= 0) loseLife();
        continue;
      }

      // bullet hits
      let destroyed = false;
      const mHitBox = {x:m.x+2, y:m.y+2, w:m.w-4, h:m.h-4};
      for(let j=bullets.length-1; j>=0; j--){
        if(rectsOverlap(bullets[j], mHitBox)){
          const boomX = bullets[j].x;
          bullets.splice(j, 1);
          m.hp--;
          m.hitFlash = 4;
          booms.push({x:boomX, y:m.y+2, t:14, big:false});
          if(m.hp <= 0){
            megas.splice(i, 1);
            booms.push({x:m.x+m.w/2,     y:m.y+m.h/2,     t:0,  big:true});
            booms.push({x:m.x+m.w/3,     y:m.y+m.h/3,     t:-4, big:false});
            booms.push({x:m.x+m.w*2/3,   y:m.y+m.h*2/3,   t:-8, big:false});
            addScore(100);
            destroyed = true;
            break;
          }
        }
      }
      if(destroyed) continue;

      // player collision
      if(player.invul <= 0 &&
         rectsOverlap({x:m.x+3, y:m.y+3, w:m.w-6, h:m.h-6},
                      {x:player.x+2, y:player.y+2, w:player.w-4, h:player.h-4})){
        megas.splice(i, 1);
        booms.push({x:m.x+m.w/2, y:m.y+m.h/2, t:0, big:true});
        loseLife();
      }
    }

    // purple flash pulse timing
    if(purseFlash > 0){
      purseFlash--;
      if(purseFlash === 0 && purplePulses > 0){
        purpleGap = 8;
        purplePulses--;
      }
    } else if(purpleGap > 0){
      purpleGap--;
      if(purpleGap === 0) purseFlash = 10;
    }

    if(levelBanner > 0) levelBanner--;

    // explosions age out
    for(let i=booms.length-1; i>=0; i--){
      booms[i].t++;
      if(booms[i].t > 20) booms.splice(i, 1);
    }
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function renderBackground(){
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    updateDrawStars();
  }

  function renderHUD(){
    // Score (left)
    drawText('SCORE', 4, 4, '#ffffff', 1, 1);
    drawText(String(score).padStart(4, '0'), 4 + textW('SCORE', 1, 1) + 3, 4, '#ffffff', 1, 1);

    // Level (centre)
    const lvStr = 'LV' + level;
    drawText(lvStr, (W/2 - textW(lvStr, 1, 1)/2)|0, 4, '#ffe24a', 1, 1);

    // Lives (right)
    const lifeX = W - 56;
    drawText('LIFE', lifeX, 4, '#ef4b4b', 1, 1);
    for(let i=0; i<lives; i++){
      drawSprite(LIFE_SPR, lifeX + textW('LIFE', 1, 1) + 4 + i*9, 2, 1);
    }
  }

  function renderPurpleFlash(){
    if(purseFlash <= 0) return;
    ctx.fillStyle = 'rgba(181, 75, 255, 0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(90, 10, 138, 0.35)';
    for(let y=0; y<H; y+=2) ctx.fillRect(0, y, W, 1);
  }

  function renderLevelBanner(){
    if(levelBanner <= 0) return;
    const s   = 2;
    const txt = 'LEVEL ' + level;
    const tw  = textW(txt, s, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, H/2-14, W, 22);
    ctx.fillStyle = '#ffe24a';
    ctx.fillRect(0, H/2-15, W, 1);
    ctx.fillRect(0, H/2+9,  W, 1);
    if(Math.floor(levelBanner/6) % 2 === 0 || levelBanner > 30){
      drawText(txt, ((W-tw)/2)|0, H/2-6, '#ffe24a', s, 1);
    }
  }

  function renderPlayer(){
    if(player.flash > 0 && Math.floor(player.flash/4) % 2 === 0) return;
    drawSprite(PLAYER_SPR, Math.floor(player.x), Math.floor(player.y));
    // engine flame
    ctx.fillStyle = blink % 2 === 0 ? '#ffe24a' : '#ef2b2b';
    ctx.fillRect((player.x + player.w/2)|0, player.y + player.h, 1, blink%2===0 ? 2 : 1);
  }

  function renderEnemies(){
    for(const e of enemies)
      drawSprite(ENEMY_SPR, Math.floor(e.x), Math.floor(e.y));
  }

  function renderMegas(){
    for(const m of megas){
      drawSprite(MEGA_SPR, Math.floor(m.x), Math.floor(m.y), 1, m.hitFlash > 0 ? '#ffffff' : null);
      // HP bar
      const bx = Math.floor(m.x);
      const by = Math.floor(m.y) - 3;
      if(by > 12){
        ctx.fillStyle = '#3a0a0a';
        ctx.fillRect(bx, by, m.w, 2);
        ctx.fillStyle = m.hp > m.maxHp/2 ? '#3aff5a' : (m.hp > m.maxHp/3 ? '#ffe24a' : '#ef2b2b');
        ctx.fillRect(bx, by, Math.max(1, (m.w * m.hp/m.maxHp)|0), 2);
      }
    }
  }

  function renderBullets(){
    for(const b of bullets){
      ctx.fillStyle = '#ffe24a';
      ctx.fillRect(b.x|0, b.y|0, b.w, b.h);
      ctx.fillStyle = '#fff';
      ctx.fillRect(b.x|0, b.y|0, b.w, 1);
    }
  }

  function renderBooms(){
    for(const k of booms){
      if(k.t < 0) continue;
      const r  = (k.t/2)|0;
      const cx = k.x|0, cy = k.y|0;
      ctx.fillStyle = k.t < 8 ? '#ffffff' : (k.t < 14 ? '#ffe24a' : '#ef2b2b');
      ctx.fillRect(cx-r, cy, r*2+1, 1);
      ctx.fillRect(cx, cy-r, 1, r*2+1);
      if(k.t < 10) ctx.fillRect(cx-1, cy-1, 3, 3);
      ctx.fillRect(cx-r-1, cy-r-1, 1, 1);
      ctx.fillRect(cx+r+1, cy-r-1, 1, 1);
      ctx.fillRect(cx-r-1, cy+r+1, 1, 1);
      ctx.fillRect(cx+r+1, cy+r+1, 1, 1);
    }
  }

  function renderOverlay(line1, line2, color1='#ef2b2b', color2='#ffffff'){
    const s = 2;
    drawText(line1, ((W - textW(line1, s, 1))/2)|0, H/2-22, color1, s, 1);
    if(blink < 40)
      drawText(line2, ((W - textW(line2, 1, 1))/2)|0, H/2+6, color2, 1, 1);
  }

  function render(){
    renderBackground();
    renderEnemies();
    renderMegas();
    renderBullets();
    renderBooms();
    renderPlayer();
    renderHUD();
    renderLevelBanner();
    renderPurpleFlash();

    if(state === STATE.START){
      drawSprite(PLAYER_SPR, Math.floor(player.x), Math.floor(player.y));
      renderOverlay('GAME START', 'PRESS FIRE TO PLAY');
    }
    if(state === STATE.OVER){
      renderOverlay('GAME OVER', 'PRESS FIRE TO RETRY');
      const scoreText = 'FINAL SCORE ' + String(score).padStart(3, '0');
      drawText(scoreText, ((W - textW(scoreText, 1, 1))/2)|0, H/2+24, '#ffe24a', 1, 1);
    }
  }

  // ── Game loop ────────────────────────────────────────────────────────────────
  function loop(){
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ── Input ────────────────────────────────────────────────────────────────────
  const btnLeft  = document.getElementById('btnLeft');
  const btnRight = document.getElementById('btnRight');
  const btnFire  = document.getElementById('btnFire');
  const btnEls   = { left:btnLeft, right:btnRight, fire:btnFire };

  function handleFire(){
    if(state === STATE.START){ state = STATE.PLAY; return; }
    if(state === STATE.OVER) { resetGame(); state = STATE.PLAY; }
  }

  function pressKey(key){
    if(input[key]) return;           // ignore auto-repeat
    input[key] = true;
    btnEls[key]?.classList.add('pressed');
    if(key === 'fire') handleFire();
  }
  function releaseKey(key){
    if(!input[key]) return;
    input[key] = false;
    btnEls[key]?.classList.remove('pressed');
  }

  function holdBind(el, key){
    const dn = e => { e.preventDefault(); pressKey(key); };
    const up = e => { e.preventDefault(); releaseKey(key); };
    el.addEventListener('touchstart',  dn, {passive:false});
    el.addEventListener('touchend',    up);
    el.addEventListener('touchcancel', up);
    el.addEventListener('mousedown',   dn);
    el.addEventListener('mouseup',     up);
    el.addEventListener('mouseleave',  up);
  }

  holdBind(btnLeft,  'left');
  holdBind(btnRight, 'right');
  holdBind(btnFire,  'fire');

  function keyToAction(k){
    if(['ArrowLeft',  'a', 'A'].includes(k)) return 'left';
    if(['ArrowRight', 'd', 'D'].includes(k)) return 'right';
    if([' ', 'Spacebar', 'z', 'Z', 'Enter'].includes(k)) return 'fire';
    return null;
  }
  window.addEventListener('keydown', e => {
    const a = keyToAction(e.key);
    if(!a) return;
    e.preventDefault();
    pressKey(a);
  });
  window.addEventListener('keyup', e => {
    const a = keyToAction(e.key);
    if(!a) return;
    e.preventDefault();
    releaseKey(a);
  });

  // prevent pull-to-refresh / scroll on touch devices
  document.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

  initStars();
  loop();
})();
</script>
</body>
</html>
